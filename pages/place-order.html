<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Order</title>
    <link rel="stylesheet" href="../css/common.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<!-- Common Navigation -->
<nav>
    <a href="../index.html">🏠 Home</a>
    <a href="./customer.html">👤 Customer</a>
    <a href="./item.html">📦 Item</a>
    <a href="./place-order.html">🛒 Place Order</a>
</nav>

<h1>Place Order</h1>

<div class="container">
    <!-- Customer and Item Selection Section -->
    <div class="section">
        <div class="order-section">
            <!-- Customer Selection -->
            <div class="customer-section">
                <h3>Select Customer</h3>
                <div class="form-group">
                    <label for="customerSelect">Customer:</label>
                    <select id="customerSelect">
                        <option value="">-- Select Customer --</option>
                        <option value="C001">Hemal - 0776655444</option>
                        <option value="C002">Kamal - 0788776655</option>
                        <option value="C003">Nimal - 0765544332</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Selected Customer:</label>
                    <div id="selectedCustomer" class="display-box">
                        No customer selected
                    </div>
                </div>
            </div>

            <!-- Item Selection -->
            <div class="item-section">
                <h3>Select Item</h3>
                <div class="form-group">
                    <label for="itemSelect">Item:</label>
                    <select id="itemSelect">
                        <option value="">-- Select Item --</option>
                        <option value="I001">Mouse - Rs. 100.00</option>
                        <option value="I002">Keyboard - Rs. 200.00</option>
                        <option value="I003">Monitor - Rs. 5000.00</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="qtyInput">Quantity:</label>
                    <input type="number" id="qtyInput" min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Available Stock:</label>
                    <div id="availableStock" class="display-box">
                        Select an item to see stock
                    </div>
                </div>
                <button type="button" class="btn btn-primary" onclick="addToCart()" style="width: 100%;">Add to Cart</button>
            </div>
        </div>
    </div>

    <!-- Cart Section -->
    <div class="section">
        <h2>Shopping Cart</h2>
        <table id="cartTable">
            <thead>
                <tr>
                    <th>Item Code</th>
                    <th>Description</th>
                    <th>Unit Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cartBody">
                <!-- Cart items will be added here dynamically -->
            </tbody>
        </table>

        <!-- Totals Section -->
        <div class="totals">
            <div>Sub Total: Rs. <span id="subTotal">0.00</span></div>
            <div>Discount (5%): Rs. <span id="discount">0.00</span></div>
            <div>Total: Rs. <span id="total">0.00</span></div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button type="button" class="btn btn-danger" onclick="clearCart()">Clear Cart</button>
            <button type="button" class="btn btn-success" onclick="placeOrder()">Place Order</button>
        </div>
    </div>
</div>

<script src="../js/place-order.js"></script>

</body>
</html>
