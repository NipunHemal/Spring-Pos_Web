<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Details</title>
    <link rel="stylesheet" href="../css/common.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<!-- Common Navigation -->
<nav>
    <a href="../index.html">🏠 Home</a>
    <a href="./customer.html">👤 Customer</a>
    <a href="./item.html">📦 Item</a>
    <a href="./place-order.html">🛒 Place Order</a>
</nav>

<div class="container">
<h1>Customer Details</h1>

<div class="section">
    <h2>Add New Customer</h2>
    <form id="customerForm">
        <div class="form-layout">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="e.g., John Doe" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone No:</label>
                <input type="tel" id="phone" name="phone" placeholder="e.g., 0776655444" required>
            </div>
        </div>
        <div class="form-group">
            <label for="address">Address:</label>
            <textarea id="address" name="address" placeholder="Enter customer address" rows="3" required></textarea>
        </div>
        <div class="action-buttons">
            <button type="submit" class="btn btn-primary">Save</button>
            <button type="button" class="btn btn-warning">Update</button>
            <button type="button" class="btn btn-danger">Delete</button>
            <button type="reset" class="btn btn-info">Reset</button>
        </div>
    </form>
</div>

<div class="section">
    <h2>Customer List</h2>
    <table id="customerTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Address</th>
                <th>Phone No</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>

</div>

<script src="../js/customer.js"></script>

</body>
</html>
